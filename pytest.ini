# pytest.ini

[pytest]
# 1. 每次執行時自動加入的參數
# -v: 顯示詳細輸出
# --tb=short: 縮短錯誤回報（Traceback）的長度
# --strict-markers: 強制檢查自定義標記是否存在
addopts = -v --tb=short --strict-markers

# 2. 設定測試檔案、類別與函式的命名規則
# 這樣 pytest 才能自動找到你的測試程式
python_files = test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# 3. 定義自定義標記（Markers）
# 避免執行時出現 "Unknown marker" 的警告
markers =
    slow: 執行時間較長的測試
    webtest: 需要網路連接的測試
    integration: 整合測試

# 4. 指定測試目錄（加速搜尋）
testpaths = tests

# 5. 設定日誌（Logging）輸出
log_cli = true
log_cli_level = INFO